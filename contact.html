<!doctype html>
<html>
  <head>
    <meta charset="UTF-8" />

    <title>Contact Aviwe Baleni | Java Developer</title>

    <meta
      name="description"
      content="Get in touch with Aviwe Baleni, a Java developer specializing in backend systems, APIs, and scalable web applications."
    />

    <meta
      name="keywords"
      content="Contact Aviwe Baleni, Java Developer Contact, Software Developer Portfolio Contact"
    />

    <meta name="author" content="Aviwe Baleni" />

    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <base href="/MIE_JAVA_2026_BALA.github.io/" />

    <link rel="stylesheet" href="css/contact-styles.css" />
    <link rel="icon" href="images/favicon.ico" />
  </head>
  <body>
    <!-- HEADER SECTION-->
    <header>
      <div class="rain"></div>
      <div class="brand">BALENI.</div>
      <button class="nav-menu-toggle">☰</button>
      <nav class="nav-links">
        <a href="index.html">Home</a>
        <a href="cv.html">CV</a>
        <a href="portfolio.html">Projects</a>
        <a href="contact.html">Contact</a>
      </nav>
    </header>

    <div class="contact-page">
      <div class="contact-card">
        <h1>Get in Touch</h1>
        <p class="subtitle">Let’s build something great together.</p>

        <form class="contact-form" id="contact-form">
          <label for="name">Name</label>
          <input
            type="text"
            id="name"
            name="name"
            placeholder="Your Name"
            required
          />
          <small class="error" id="name-error"></small>

          <label for="email">Email</label>
          <input
            type="email"
            id="email"
            name="email"
            placeholder="Your Email"
            required
          />
          <small class="error" id="email-error"></small>

          <label for="message">Message</label>
          <textarea
            id="message"
            name="message"
            placeholder="Your Message"
            rows="5"
            required
          ></textarea>
          <small class="error" id="message-error"></small>

          <button type="submit">Send Message</button>

          <p id="success-message"></p>
        </form>
      </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/emailjs-com@3/dist/email.min.js"></script>
    <script src="js/script.js" defer></script>
  </body>
</html>
